<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Manager - BroqInsta CMS</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>window.CKEDITOR_BASEPATH = 'https://cdn.ckeditor.com/4.25.1/full/';</script>
    <script src="https://cdn.ckeditor.com/4.25.1/full/ckeditor.js"></script>
    <style>
        .sidebar-link {
            display: flex;
            align-items: center;
            padding: 1rem 1.5rem;
            color: #6B7280;
            font-weight: 700;
            font-size: 0.875rem;
            border-radius: 1rem;
            transition: all 0.3s ease;
        }

        .sidebar-link:hover,
        .sidebar-link.active {
            color: #7C3AED;
            background: #F3F4F6;
        }

        .modal-animate {
            animation: modalFadeIn 0.3s ease-out forwards;
        }

        @keyframes modalFadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>

<body class="bg-[#FAFBFC] min-h-screen flex flex-col md:flex-row">
    <aside class="w-full md:w-72 bg-white border-r border-gray-100 p-8 flex flex-col z-50">
        <div class="flex items-center space-x-3 mb-16">
            <div class="w-10 h-10 bg-gray-50 rounded-xl p-1 shadow-sm">
                <img src="../images/logo.png" class="w-full h-full object-contain">
            </div>
            <span class="text-xl font-black italic">BroqInsta<span class="text-purple-600">.</span></span>
        </div>

        <nav class="space-y-4 flex-grow">
            <a href="/admin" class="sidebar-link">
                <span class="mr-3">📊</span> Dashboard
            </a>
            <a href="/admin/api-settings.html" class="sidebar-link">
                <span class="mr-3">🔑</span> API Config
            </a>
            <a href="/admin/blog-manager.html" class="sidebar-link active">
                <span class="mr-3">📝</span> Blog Posts
            </a>
            <a href="/admin/pages-manager.html" class="sidebar-link">
                <span class="mr-3">📄</span> Pages
            </a>
            <a href="/admin/ads-manager.html" class="sidebar-link">
                <span class="mr-3">📢</span> Ad Manager
            </a>
            <a href="/admin/settings.html" class="sidebar-link">
                <span class="mr-3">⚙️</span> Site Settings
            </a>
            <a href="/admin/scripts-manager.html" class="sidebar-link">
                <span class="mr-3">🛠️</span> Advanced Tools
            </a>
        </nav>

        <div class="mt-auto pt-8 border-t border-gray-50">
            <a href="/api/admin/logout" class="sidebar-link text-red-500 hover:bg-red-50">
                <span class="mr-3">🚪</span> Terminate Session
            </a>
        </div>
    </aside>

    <main class="flex-grow p-8 md:p-12 overflow-y-auto">
        <header class="flex justify-between items-center mb-16 stagger-in">
            <div>
                <h1 class="text-4xl font-black text-gray-900">Blog Posts</h1>
                <p class="text-gray-400 font-bold uppercase tracking-widest text-[10px] mt-2">Manage SEO Blog Content</p>
            </div>
            <button id="addPostBtn" class="btn-primary shadow-glow">
                <span>+ New Post</span>
            </button>
        </header>

        <div class="glass-card p-10 rounded-[2.5rem] border-none shadow-sm animate-on-scroll">
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                        <tr class="text-[10px] font-black uppercase tracking-widest text-gray-400 border-b border-gray-50">
                            <th class="pb-6">Title / URL</th>
                            <th class="pb-6 text-center">Category</th>
                            <th class="pb-6 text-center">Status</th>
                            <th class="pb-6">Date</th>
                            <th class="pb-6 text-right">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="blogPostsTable" class="text-sm font-bold text-gray-600">
                        <tr>
                            <td colspan="5" class="py-12 text-center text-gray-300 italic">Loading posts...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="postModal"
        class="hidden fixed inset-0 bg-gray-900/60 backdrop-blur-md z-[1000] flex items-center justify-center p-4">
        <div
            class="bg-white w-full max-w-5xl rounded-[3rem] p-12 max-h-[90vh] overflow-y-auto shadow-2xl modal-animate">
            <div class="flex justify-between items-center mb-10">
                <h2 id="modalTitle" class="text-3xl font-black text-gray-900">New Blog Post</h2>
                <button id="closeModal" class="text-3xl text-gray-400 hover:text-gray-900 transition-colors">&times;</button>
            </div>

            <form id="postForm" class="space-y-8">
                <input type="hidden" id="postId">
                <div class="grid md:grid-cols-2 gap-8">
                    <div class="space-y-3">
                        <label class="text-[10px] font-black uppercase tracking-widest text-gray-400 px-2">Title</label>
                        <input type="text" id="postTitle" placeholder="How To Download Instagram Reels" required class="input-field">
                    </div>
                    <div class="space-y-3">
                        <label class="text-[10px] font-black uppercase tracking-widest text-gray-400 px-2">SEO Slug</label>
                        <input type="text" id="postSlug" placeholder="how-to-download-instagram-reels" required class="input-field">
                    </div>
                </div>

                <div class="grid md:grid-cols-2 gap-8">
                    <div class="space-y-3">
                        <label class="text-[10px] font-black uppercase tracking-widest text-gray-400 px-2">Category</label>
                        <input type="text" id="postCategory" placeholder="General" class="input-field" list="categoryList">
                        <datalist id="categoryList">
                            <option value="General">
                            <option value="Tutorials">
                            <option value="Product Updates">
                            <option value="Industry News">
                        </datalist>
                    </div>
                    <div class="space-y-3">
                        <label class="text-[10px] font-black uppercase tracking-widest text-gray-400 px-2">Tags (comma separated)</label>
                        <input type="text" id="postTags" placeholder="instagram, reels, download" class="input-field">
                    </div>
                </div>

                <div class="space-y-3">
                    <label class="text-[10px] font-black uppercase tracking-widest text-gray-400 px-2">Excerpt</label>
                    <textarea id="postExcerpt" rows="2" placeholder="Brief summary for blog listing..." class="input-field resize-none"></textarea>
                </div>

                <div class="grid md:grid-cols-2 gap-8">
                    <div class="space-y-3">
                        <label class="text-[10px] font-black uppercase tracking-widest text-gray-400 px-2">Meta Title (SEO)</label>
                        <input type="text" id="postMetaTitle" placeholder="Custom title for search engines (optional)" class="input-field">
                    </div>
                    <div class="space-y-3">
                        <label class="text-[10px] font-black uppercase tracking-widest text-gray-400 px-2">Meta Description (SEO)</label>
                        <input type="text" id="postMetaDescription" placeholder="Brief description for search engines..." class="input-field">
                    </div>
                </div>

                <div class="space-y-3">
                    <label class="text-[10px] font-black uppercase tracking-widest text-gray-400 px-2">Featured Image URL</label>
                    <input type="url" id="postFeaturedImage" placeholder="https://example.com/image.jpg" class="input-field">
                </div>

                <div class="space-y-3">
                    <label class="text-[10px] font-black uppercase tracking-widest text-gray-400 px-2">Content (Rich Text)</label>
                    <textarea id="postContent" rows="12" placeholder="Write your post content..." class="input-field font-mono text-sm resize-none"></textarea>
                </div>

                <div class="grid md:grid-cols-2 gap-8">
                    <div class="space-y-3">
                        <label class="text-[10px] font-black uppercase tracking-widest text-gray-400 px-2">Status</label>
                        <select id="postStatus" class="input-field">
                            <option value="published">Published</option>
                            <option value="draft">Draft</option>
                        </select>
                    </div>
                </div>

                <div class="flex justify-end pt-6 space-x-6">
                    <button type="submit" id="saveBtn" class="btn-primary px-16 shadow-glow">
                        <span>Publish Post</span>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const modal = document.getElementById('postModal');
        const postForm = document.getElementById('postForm');
        const postId = document.getElementById('postId');
        const postTitle = document.getElementById('postTitle');
        const postSlug = document.getElementById('postSlug');
        const postExcerpt = document.getElementById('postExcerpt');
        const postMetaTitle = document.getElementById('postMetaTitle');
        const postMetaDescription = document.getElementById('postMetaDescription');
        const postFeaturedImage = document.getElementById('postFeaturedImage');
        const postCategory = document.getElementById('postCategory');
        const postTags = document.getElementById('postTags');
        const postContent = document.getElementById('postContent');
        const postStatus = document.getElementById('postStatus');
        const modalTitle = document.getElementById('modalTitle');
        const saveBtn = document.getElementById('saveBtn');

        let allPosts = [];

        postTitle.oninput = () => {
            if (!postId.value) {
                postSlug.value = postTitle.value.toLowerCase().replace(/[^a-z0-9]/g, '-').replace(/-+/g, '-').replace(/^-|-$/g, '');
            }
        };

        async function loadPosts() {
            try {
                const res = await fetch('/api/admin/blog/posts');
                const data = await res.json();
                if (data.success) {
                    allPosts = data.posts;
                    if (data.posts.length === 0) {
                        document.getElementById('blogPostsTable').innerHTML = '<tr><td colspan="5" class="py-12 text-center text-gray-300 italic">No posts yet. Click "+ New Post" to create one.</td></tr>';
                        return;
                    }
                    document.getElementById('blogPostsTable').innerHTML = data.posts.map(post => `
                        <tr class="border-b border-gray-50 group hover:bg-gray-50/50 transition-colors">
                            <td class="py-8">
                                <p class="text-gray-900 font-black">${post.title}</p>
                                <p class="text-[10px] text-purple-600 font-mono">/${post.slug}</p>
                            </td>
                            <td class="py-8 text-center">
                                <span class="px-3 py-1 bg-purple-50 text-purple-600 rounded-full text-[9px] font-black uppercase tracking-widest">${post.category || 'General'}</span>
                            </td>
                            <td class="py-8 text-center">
                                <span class="px-4 py-1.5 ${post.status === 'published' ? 'bg-green-50 text-green-600 border-green-100' : 'bg-yellow-50 text-yellow-600 border-yellow-100'} rounded-full text-[9px] font-black uppercase tracking-widest border">${post.status}</span>
                            </td>
                            <td class="py-8 text-gray-400 text-xs">${new Date(post.created_at).toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' })}</td>
                            <td class="py-8 text-right space-x-6">
                                <a href="/${post.slug}" target="_blank" class="text-xs font-black text-gray-400 hover:text-purple-600 uppercase tracking-widest">Preview</a>
                                <button onclick="editPost(${post.id})" class="text-xs font-black text-gray-400 hover:text-gray-900 uppercase tracking-widest">Edit</button>
                                <button onclick="deletePost(${post.id})" class="text-xs font-black text-red-300 hover:text-red-500 uppercase tracking-widest">Delete</button>
                            </td>
                        </tr>
                    `).join('');
                }
            } catch (err) {
                console.error('Failed to load posts');
            }
        }

        function editPost(id) {
            const post = allPosts.find(p => p.id == id);
            if (!post) return;
            postId.value = post.id;
            postTitle.value = post.title;
            postSlug.value = post.slug;
            postExcerpt.value = post.excerpt || '';
            postMetaTitle.value = post.meta_title || '';
            postMetaDescription.value = post.meta_description || '';
            postFeaturedImage.value = post.featured_image || '';
            postCategory.value = post.category || 'General';
            postTags.value = post.tags || '';
            postStatus.value = post.status || 'published';
            postContent.value = post.content || '';
            modalTitle.innerText = 'Edit Post';
            saveBtn.innerHTML = '<span>Update Post</span>';
            modal.classList.remove('hidden');
            if (CKEDITOR.instances.postContent) CKEDITOR.instances.postContent.setData(post.content || '');
        }

        async function deletePost(id) {
            if (!confirm('Are you sure you want to delete this post?')) return;
            const res = await fetch(`/api/admin/blog/posts/${id}`, { method: 'DELETE' });
            if ((await res.json()).success) loadPosts();
        }

        document.getElementById('addPostBtn').onclick = () => {
            postForm.reset();
            postId.value = '';
            postCategory.value = 'General';
            postStatus.value = 'published';
            modalTitle.innerText = 'New Blog Post';
            saveBtn.innerHTML = '<span>Publish Post</span>';
            modal.classList.remove('hidden');
            if (CKEDITOR.instances.postContent) CKEDITOR.instances.postContent.setData('');
        };

        document.getElementById('closeModal').onclick = () => modal.classList.add('hidden');

        postForm.onsubmit = async (e) => {
            e.preventDefault();
            const id = postId.value;
            const method = id ? 'PUT' : 'POST';
            const url = id ? `/api/admin/blog/posts/${id}` : '/api/admin/blog/posts';
            const res = await fetch(url, {
                method: method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    title: postTitle.value,
                    slug: postSlug.value,
                    excerpt: postExcerpt.value,
                    meta_title: postMetaTitle.value,
                    meta_description: postMetaDescription.value,
                    featured_image: postFeaturedImage.value,
                    category: postCategory.value || 'General',
                    tags: postTags.value,
                    content: CKEDITOR.instances.postContent ? CKEDITOR.instances.postContent.getData() : postContent.value,
                    status: postStatus.value
                })
            });
            const result = await res.json();
            if (result.success) {
                modal.classList.add('hidden');
                loadPosts();
            } else {
                alert(result.error || 'Failed to save post');
            }
        };

        CKEDITOR.replace('postContent', {
            height: 400,
            versionCheck: false,
            removeButtons: '',
            allowedContent: true,
            extraPlugins: 'colorbutton,font,justify,tableresize,uploadimage,image2',
            toolbar: [
                { name: 'document', items: ['Source', '-', 'NewPage', 'Preview', 'Print'] },
                { name: 'clipboard', items: ['Cut', 'Copy', 'Paste', 'PasteText', 'PasteFromWord', '-', 'Undo', 'Redo'] },
                { name: 'editing', items: ['Find', 'Replace', '-', 'SelectAll', '-', 'Scayt'] },
                '/',
                { name: 'basicstyles', items: ['Bold', 'Italic', 'Underline', 'Strike', 'Subscript', 'Superscript', '-', 'CopyFormatting', 'RemoveFormat'] },
                { name: 'paragraph', items: ['NumberedList', 'BulletedList', '-', 'Outdent', 'Indent', '-', 'Blockquote', 'CreateDiv', '-', 'JustifyLeft', 'JustifyCenter', 'JustifyRight', 'JustifyBlock'] },
                { name: 'links', items: ['Link', 'Unlink', 'Anchor'] },
                { name: 'insert', items: ['Image', 'Table', 'HorizontalRule', 'Smiley', 'SpecialChar', 'Iframe'] },
                '/',
                { name: 'styles', items: ['Styles', 'Format', 'Font', 'FontSize'] },
                { name: 'colors', items: ['TextColor', 'BGColor'] },
                { name: 'tools', items: ['Maximize', 'ShowBlocks'] }
            ]
        });

        loadPosts();

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => entry.isIntersecting && entry.target.classList.add('visible'));
        }, { threshold: 0.1 });
        document.querySelectorAll('.animate-on-scroll').forEach(el => observer.observe(el));
    </script>
</body>

</html>
